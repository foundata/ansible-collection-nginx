# Internal role variables specific to: Fedora (distribution)
#
# Only values specific to the platform and its functionality should be included
# here. Variables in this file override those defined in vars/main.yml.

---

__run_nginx_server_exec_path: "/usr/sbin/nginx"


# Hint: update this variable with hack/gen-modules-map-resources.sh
#
# Fedora ships additional modules not available on RHEL/AlmaLinux/CentOS.
# This map therefore includes both the base RedHat entries (from
# vars/redhat.yml) and Fedora-specific extras.
__run_nginx_modules_map_resources:
  http_brotli_filter:
    conf_files:
      - name: "mod-brotli.conf"
        type: "symlink"
        target: "/usr/share/nginx/modules/mod-brotli.conf"
    packages:
      - "nginx-mod-brotli"
  http_brotli_static:
    conf_files:
      - name: "mod-brotli.conf"
        type: "symlink"
        target: "/usr/share/nginx/modules/mod-brotli.conf"
    packages:
      - "nginx-mod-brotli"
  http_fancyindex:
    conf_files:
      - name: "mod-fancyindex.conf"
        type: "symlink"
        target: "/usr/share/nginx/modules/mod-fancyindex.conf"
    packages:
      - "nginx-mod-fancyindex"
  http_geoip:
    conf_files:
      - name: "mod-http-geoip.conf"
        type: "symlink"
        target: "/usr/share/nginx/modules/mod-http-geoip.conf"
    packages:
      - "nginx-mod-http-geoip"
  http_headers_more_filter:
    conf_files:
      - name: "mod-headers-more.conf"
        type: "symlink"
        target: "/usr/share/nginx/modules/mod-headers-more.conf"
    packages:
      - "nginx-mod-headers-more"
  http_image_filter:
    conf_files:
      - name: "mod-http-image-filter.conf"
        type: "symlink"
        target: "/usr/share/nginx/modules/mod-http-image-filter.conf"
    packages:
      - "nginx-mod-http-image-filter"
  http_modsecurity:
    conf_files:
      - name: "mod-modsecurity.conf"
        type: "symlink"
        target: "/usr/share/nginx/modules/mod-modsecurity.conf"
    packages:
      - "nginx-mod-modsecurity"
  http_naxsi:
    conf_files:
      - name: "mod-naxsi-web-app-firewall.conf"
        type: "symlink"
        target: "/usr/share/nginx/modules/mod-naxsi-web-app-firewall.conf"
    packages:
      - "nginx-mod-naxsi"
  http_perl:
    conf_files:
      - name: "mod-http-perl.conf"
        type: "symlink"
        target: "/usr/share/nginx/modules/mod-http-perl.conf"
    packages:
      - "nginx-mod-http-perl"
  http_vhost_traffic_status:
    conf_files:
      - name: "mod-vhost-traffic-status.conf"
        type: "symlink"
        target: "/usr/share/nginx/modules/mod-vhost-traffic-status.conf"
    packages:
      - "nginx-mod-vts"
  http_xslt_filter:
    conf_files:
      - name: "mod-http-xslt-filter.conf"
        type: "symlink"
        target: "/usr/share/nginx/modules/mod-http-xslt-filter.conf"
    packages:
      - "nginx-mod-http-xslt-filter"
  mail:
    conf_files:
      - name: "mod-mail.conf"
        type: "symlink"
        target: "/usr/share/nginx/modules/mod-mail.conf"
    packages:
      - "nginx-mod-mail"
  stream:
    conf_files:
      - name: "mod-stream.conf"
        type: "symlink"
        target: "/usr/share/nginx/modules/mod-stream.conf"
    packages:
      - "nginx-mod-stream"
  stream_geoip:
    conf_files:
      - name: "zz-mod-stream-geoip.conf"
        type: "symlink"
        target: "/usr/share/nginx/modules/zz-mod-stream-geoip.conf"
    packages:
      - "nginx-mod-stream-geoip"
