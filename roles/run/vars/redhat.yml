# Internal role variables specific to: RedHat (os_family or distribution)
#
# Only values specific to the platform and its functionality should be included
# here. Variables in this file override those defined in vars/main.yml.

---

__run_nginx_module_so_lib_dir_path: "/usr/lib64/nginx/modules"


# Hint: update this variable with hack/gen-modules-map-resources.sh
#
# Packages only available on Fedora (not RHEL/AlmaLinux/CentOS) are in
# vars/fedora.yml instead.
__run_nginx_modules_map_resources:
  http_image_filter:
    conf_paths:
      - "/usr/share/nginx/modules/mod-http-image-filter.conf"
    packages:
      - "nginx-mod-http-image-filter"
    so_paths:
      - "/usr/lib64/nginx/modules/ngx_http_image_filter_module.so"
  http_perl:
    conf_paths:
      - "/usr/share/nginx/modules/mod-http-perl.conf"
    packages:
      - "nginx-mod-http-perl"
    so_paths:
      - "/usr/lib64/nginx/modules/ngx_http_perl_module.so"
  http_xslt_filter:
    conf_paths:
      - "/usr/share/nginx/modules/mod-http-xslt-filter.conf"
    packages:
      - "nginx-mod-http-xslt-filter"
    so_paths:
      - "/usr/lib64/nginx/modules/ngx_http_xslt_filter_module.so"
  mail:
    conf_paths:
      - "/usr/share/nginx/modules/mod-mail.conf"
    packages:
      - "nginx-mod-mail"
    so_paths:
      - "/usr/lib64/nginx/modules/ngx_mail_module.so"
  stream:
    conf_paths:
      - "/usr/share/nginx/modules/mod-stream.conf"
    packages:
      - "nginx-mod-stream"
    so_paths:
      - "/usr/lib64/nginx/modules/ngx_stream_module.so"
