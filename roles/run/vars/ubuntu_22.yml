# Internal role variables specific to: Ubuntu 22.x (distribution_major_version)
#
# Only values specific to the platform and its functionality should be included
# here. Variables in this file override those defined in vars/debian.yml.

---

# Hint: update this variable with hack/gen-modules-map-resources.sh
#
# Ubuntu 22.04 ships fewer modules than Debian 13 / Ubuntu 24.04 (no brotli,
# no auth_spnego, no lua, no js, no modsecurity, no push_stream, etc.).
__run_nginx_modules_map_resources:
  http_auth_pam:
    conf_files:
      - name: "50-mod-http-auth-pam.conf"
        type: "symlink"
        target: "/usr/share/nginx/modules-available/mod-http-auth-pam.conf"
    packages:
      - "libnginx-mod-http-auth-pam"
