# Internal role variables specific to: SUSE (os_family)
#
# Only values specific to the platform and its functionality should be included
# here. Variables in this file override those defined in vars/main.yml.

---

__run_nginx_main_directives_overwrite:
  user: "nginx nginx"


# SUSE maintains "/etc/nginx/vhosts.d/" by default and uses the "vHost" terminology,
# comparable to Apache HTTPD.
__run_nginx_config_service_dropin_sites_available_dir_path: "/etc/nginx/vhosts.d-available"
__run_nginx_config_service_dropin_sites_enabled_dir_path: "/etc/nginx/vhosts.d"


__run_nginx_module_so_lib_dir_path: "/usr/lib64/nginx/modules"


# Hint: update this variable with hack/gen-modules-map-resources.sh
#
# Empty-list entries ([]) for packages indicate modules shipped by the base
# "nginx" package on SUSE - no separate package install needed, but a
# load_module directive is still required.
__run_nginx_modules_map_resources:
  http_brotli_filter:
    conf_files:
      - name: "mod-http-brotli-filter.conf"
        type: "load_module"
        target: "/usr/lib64/nginx/modules/ngx_http_brotli_filter_module.so"
    packages:
      - "nginx-module-brotli"
  http_brotli_static:
    conf_files:
      - name: "mod-http-brotli-static.conf"
        type: "load_module"
        target: "/usr/lib64/nginx/modules/ngx_http_brotli_static_module.so"
    packages:
      - "nginx-module-brotli"
  http_echo:
    conf_files:
      - name: "mod-http-echo.conf"
        type: "load_module"
        target: "/usr/lib64/nginx/modules/ngx_http_echo_module.so"
    packages:
      - "nginx-module-echo"
  http_geoip2:
    conf_files:
      - name: "mod-http-geoip2.conf"
        type: "load_module"
        target: "/usr/lib64/nginx/modules/ngx_http_geoip2_module.so"
    packages:
      - "nginx-module-geoip2"
  http_image_filter:
    conf_files:
      - name: "mod-http-image-filter.conf"
        type: "load_module"
        target: "/usr/lib64/nginx/modules/ngx_http_image_filter_module.so"
    packages: []
  http_js:
    conf_files:
      - name: "mod-http-js.conf"
        type: "load_module"
        target: "/usr/lib64/nginx/modules/ngx_http_js_module.so"
    packages:
      - "nginx-module-njs"
  http_lua:
    conf_files:
      - name: "mod-http-lua.conf"
        type: "load_module"
        target: "/usr/lib64/nginx/modules/ngx_http_lua_module.so"
    packages:
      - "nginx-module-lua"
  http_perl:
    conf_files:
      - name: "mod-http-perl.conf"
        type: "load_module"
        target: "/usr/lib64/nginx/modules/ngx_http_perl_module.so"
    packages: []
  http_vhost_traffic_status:
    conf_files:
      - name: "mod-vts.conf"
        type: "symlink"
        target: "/usr/share/nginx/modules/mod-vts.conf"
    packages:
      - "nginx-module-vts"
  http_xslt_filter:
    conf_files:
      - name: "mod-http-xslt-filter.conf"
        type: "load_module"
        target: "/usr/lib64/nginx/modules/ngx_http_xslt_filter_module.so"
    packages: []
  http_zstd_filter:
    conf_files:
      - name: "mod-http-zstd-filter.conf"
        type: "load_module"
        target: "/usr/lib64/nginx/modules/ngx_http_zstd_filter_module.so"
    packages:
      - "nginx-module-zstd"
  http_zstd_static:
    conf_files:
      - name: "mod-http-zstd-static.conf"
        type: "load_module"
        target: "/usr/lib64/nginx/modules/ngx_http_zstd_static_module.so"
    packages:
      - "nginx-module-zstd"
  mail:
    conf_files:
      - name: "mod-mail.conf"
        type: "load_module"
        target: "/usr/lib64/nginx/modules/ngx_mail_module.so"
    packages: []
  stream:
    conf_files:
      - name: "mod-stream.conf"
        type: "load_module"
        target: "/usr/lib64/nginx/modules/ngx_stream_module.so"
    packages: []
  stream_geoip2:
    conf_files:
      - name: "mod-stream-geoip2.conf"
        type: "load_module"
        target: "/usr/lib64/nginx/modules/ngx_stream_geoip2_module.so"
    packages:
      - "nginx-module-geoip2"
  stream_js:
    conf_files:
      - name: "mod-stream-js.conf"
        type: "load_module"
        target: "/usr/lib64/nginx/modules/ngx_stream_js_module.so"
    packages:
      - "nginx-module-njs"


__run_nginx_http_directives_overwrite:
  include:
    - "/etc/nginx/mime.types"
    - "/etc/nginx/conf.d/*.conf"
    - "{{ __run_nginx_config_service_dropin_sites_enabled_dir_path }}/*.conf"
