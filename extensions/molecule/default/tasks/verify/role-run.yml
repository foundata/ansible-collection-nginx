## Gzip configuration

- name: "Molecule | Verify | Assert gzip directives are present in NGINX configuration"
  ansible.builtin.assert:
    that:
      - __testing_nginx_full_config['stdout'] is ansible.builtin.search('gzip on;')
      - __testing_nginx_full_config['stdout'] is ansible.builtin.search('gzip_comp_level 5;')
      - __testing_nginx_full_config['stdout'] is ansible.builtin.search('gzip_min_length 256;')
      - __testing_nginx_full_config['stdout'] is ansible.builtin.search('gzip_proxied any;')
      - __testing_nginx_full_config['stdout'] is ansible.builtin.search('gzip_types.*text/css.*application/json')
      - __testing_nginx_full_config['stdout'] is ansible.builtin.search('gzip_vary on;')
    fail_msg: >-
      One or more expected gzip directives are missing from the NGINX configuration.
    success_msg: >-
      All expected gzip directives are present in the NGINX configuration.


## TLS baseline configuration (Mozilla Guideline v6.0)

- name: "Molecule | Verify | Get OpenSSL version for ECDH curve expectation"
  ansible.builtin.command:
    cmd: "openssl version"
  changed_when:
    - false
  register: __testing_openssl_version


- name: "Molecule | Verify | Parse OpenSSL version number"
  ansible.builtin.set_fact:
    __testing_openssl_version_number: >-
      {{
        (__testing_openssl_version['stdout']
        | ansible.builtin.regex_search('OpenSSL\s+(\d+\.\d+\.\d+)', '\1'))[0]
      }}


- name: "Molecule | Verify | Determine expected ECDH curves based on OpenSSL version"
  ansible.builtin.set_fact:
    __testing_expected_ecdh_curves: >-
      {{
        'X25519MLKEM768:X25519:prime256v1:secp384r1'
        if (__testing_openssl_version_number is ansible.builtin.version('3.5', '>='))
        else 'X25519:prime256v1:secp384r1'
      }}


- name: "Molecule | Verify | Assert TLS baseline directives are present in NGINX configuration"
  ansible.builtin.assert:
    that:
      - __testing_nginx_full_config['stdout'] is ansible.builtin.search('ssl_protocols TLSv1\.2 TLSv1\.3;')
      - __testing_nginx_full_config['stdout'] is ansible.builtin.search('ssl_prefer_server_ciphers off;')
      - >-
        __testing_nginx_full_config['stdout']
        is ansible.builtin.search('ssl_dhparam '
        ~ __run_nginx_effective_snippet_settings['tls-baseline']['dhparam_path']
        ~ ';')
      - __testing_nginx_full_config['stdout'] is ansible.builtin.search('ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:')
      - >-
        __testing_nginx_full_config['stdout']
        is ansible.builtin.search('ssl_ecdh_curve '
        ~ __testing_expected_ecdh_curves
        ~ ';')
      - __testing_nginx_full_config['stdout'] is ansible.builtin.search('ssl_session_timeout 1d;')
      - __testing_nginx_full_config['stdout'] is ansible.builtin.search('ssl_session_cache shared:MozSSL:10m;')
      - __testing_nginx_full_config['stdout'] is ansible.builtin.search('ssl_stapling on;')
      - __testing_nginx_full_config['stdout'] is ansible.builtin.search('ssl_stapling_verify on;')
    fail_msg: >-
      One or more TLS baseline directives are missing or have unexpected values
      in the NGINX configuration.
      OpenSSL version: {{ __testing_openssl_version_number }},
      expected ECDH curves: {{ __testing_expected_ecdh_curves }}
    success_msg: >-
      All TLS baseline directives (ssl_protocols, ssl_prefer_server_ciphers,
      ssl_dhparam, ssl_ciphers, ssl_ecdh_curve, ssl_session_timeout,
      ssl_session_cache, ssl_stapling) are present with expected values.
      OpenSSL version: {{ __testing_openssl_version_number }},
      ECDH curves: {{ __testing_expected_ecdh_curves }}


## Security response headers

- name: "Molecule | Verify | Fetch HTTPS response headers from example.com"
  ansible.builtin.command:
    argv:
      - "curl"
      - "--head"
      - "--silent"
      - "--insecure"
      - "--resolve"
      - "example.com:443:127.0.0.1"
      - "https://example.com/"
  changed_when:
    - false
  register: __testing_https_headers


- name: "Molecule | Verify | Assert security response headers are present"
  ansible.builtin.assert:
    that:
      - __testing_https_headers['stdout'] is ansible.builtin.search('(?i)X-Content-Type-Options:\s*nosniff')
      - __testing_https_headers['stdout'] is ansible.builtin.search('(?i)X-Frame-Options:\s*sameorigin')
      - __testing_https_headers['stdout'] is ansible.builtin.search('(?i)Referrer-Policy:\s*strict-origin-when-cross-origin')
    fail_msg: >-
      One or more expected security headers are missing from the HTTPS response.
      Response headers: {{ __testing_https_headers['stdout'] }}
    success_msg: >-
      All expected security headers (X-Content-Type-Options, X-Frame-Options,
      Referrer-Policy) are present in the HTTPS response.


## HSTS response header

- name: "Molecule | Verify | Assert HSTS header is present in HTTPS response"
  ansible.builtin.assert:
    that:
      - __testing_https_headers['stdout'] is ansible.builtin.search('(?i)Strict-Transport-Security:.*max-age=31536000.*includeSubDomains')
    fail_msg: >-
      The HSTS header is missing or has unexpected values in the HTTPS response.
      Response headers: {{ __testing_https_headers['stdout'] }}
    success_msg: >-
      The HSTS header is present with expected values (max-age=31536000; includeSubDomains).


## Cache-Control for static assets

- name: "Molecule | Verify | Fetch HTTPS response headers for static asset"
  ansible.builtin.command:
    argv:
      - "curl"
      - "--head"
      - "--silent"
      - "--insecure"
      - "--resolve"
      - "example.com:443:127.0.0.1"
      - "https://example.com/test.css"
  changed_when:
    - false
  register: __testing_static_headers


- name: "Molecule | Verify | Assert Cache-Control header is present for static assets"
  ansible.builtin.assert:
    that:
      - __testing_static_headers['stdout'] is ansible.builtin.search('(?i)Cache-Control:.*public.*immutable')
    fail_msg: >-
      The Cache-Control header for static assets is missing or has unexpected values.
      Response headers: {{ __testing_static_headers['stdout'] }}
    success_msg: >-
      The Cache-Control header for static assets contains 'public' and 'immutable'.
