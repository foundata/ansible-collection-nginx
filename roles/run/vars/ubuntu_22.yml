# Internal role variables specific to: Ubuntu 22.x (distribution_major_version)
#
# Only values specific to the platform and its functionality should be included
# here. Variables in this file override those defined in vars/debian.yml.

---

__run_nginx_packages_install_map_modules:
  # Hint for package names: apt list 'libnginx-mod-*'
  # Ubuntu 22.04 does not ship the brotli modules (available from Debian 12 /
  # Ubuntu 24.04 onwards). This map therefore mirrors vars/debian.yml minus the
  # http_brotli_filter and http_brotli_static entries.
  ndk_http:
    - "libnginx-mod-http-ndk"
  http_auth_pam:
    - "libnginx-mod-http-auth-pam"
  http_auth_spnego:
    - "libnginx-mod-http-auth-spnego"
  http_cache_purge:
    - "libnginx-mod-http-cache-purge"
  http_dav_ext:
    - "libnginx-mod-http-dav-ext"
  http_echo:
    - "libnginx-mod-http-echo"
  http_fancyindex:
    - "libnginx-mod-http-fancyindex"
  http_geoip2:
    - "libnginx-mod-http-geoip2"
  # deprecated, MaxMind stopped updating legacy GeoIP
  # in 2019; use http_geoip2 instead
  http_geoip:
    - "libnginx-mod-http-geoip"
  http_headers_more_filter:
    - "libnginx-mod-http-headers-more-filter"
  http_image_filter:
    - "libnginx-mod-http-image-filter"
  http_js:
    - "libnginx-mod-http-js"
  http_lua:
    - "libnginx-mod-http-lua"
  http_memc:
    - "libnginx-mod-http-memc"
  http_modsecurity:
    - "libnginx-mod-http-modsecurity"
  http_perl:
    - "libnginx-mod-http-perl"
  http_push_stream:
    - "libnginx-mod-http-push-stream"
  http_set_misc:
    - "libnginx-mod-http-set-misc"
  http_srcache_filter:
    - "libnginx-mod-http-srcache-filter"
  http_subs_filter:
    - "libnginx-mod-http-subs-filter"
  http_uploadprogress:
    - "libnginx-mod-http-uploadprogress"
  http_upstream_fair:
    - "libnginx-mod-http-upstream-fair"
  http_xslt_filter:
    - "libnginx-mod-http-xslt-filter"
  mail:
    - "libnginx-mod-mail"
  nchan:
    - "libnginx-mod-nchan"
  rtmp:
    - "libnginx-mod-rtmp"
  stream_geoip2:
    - "libnginx-mod-stream-geoip2"
  stream_geoip:
    - "libnginx-mod-stream-geoip"
  stream_js:
    - "libnginx-mod-stream-js"
  stream:
    - "libnginx-mod-stream"
