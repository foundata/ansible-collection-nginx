# Default variables and values for this role.
#
# These variables are designed to be easily overridden (as they have a low
# precedence) and typically allow users to customize the role's behavior.
# Each variable should have a clear comment above it, describing its purpose
# and how it fits into the role's functionality.

---

# Determines whether the managed resources should be `present` or `absent`.
#
# `present` ensures that required components, such as software packages, are
# installed and configured.
#
# `absent` reverts changes as much as possible, such as removing packages,
# deleting created users, stopping services, restoring modified settings, …
#
# - Type: str
# - Required: No
# - Default: present
# - Choices: present, absent
run_nginx_state: "present"


# If set to `true`, all managed packages will be upgraded during each Ansible
# run (e.g., when the package provider detects a newer version than the
# currently installed one).
#
# - Type: bool
# - Required: No
# - Default: false
run_nginx_autoupgrade: false


# Defines the status of the service(s).
#
# `enabled`: Service is running and will start automatically at boot.
#
# `disabled`: Service is stopped and will not start automatically at boot.
#
# `running` Service is running but will not start automatically at boot. This
# can be used to start a service on the first Ansible run without enabling it
# for boot.
#
# `unmanaged`: Service will not start at boot, and Ansible will not manage its
# running state. This is primarily useful when services are monitored and
# managed by systems other than Ansible.
#
# The singular form (`service`) is used for simplicity. However, the defined
# status applies to all services if multiple are being managed by this role.
#
# - Type: str
# - Required: No
# - Default: enabled
# - Choices: enabled, disabled, running, unmanaged
run_nginx_service_state: "enabled"

# Controls whether the role includes a hardened catch-all `server {}` block in
# the `http {}` section of the main configuration file (`nginx.conf`).
#
# When set to `true`, a default server is rendered that listens on ports 80 and
# 443 with `default_server`.
#
# This acts as a security fallback preventing unintended content exposure when
# requests arrive for unknown hostnames or manipulated SNI values. Set to
# `false` if you prefer to define your own catch-all server via
# `run_nginx_sites_config`.
#
# - Type: bool
# - Required: No
# - Default: true
run_nginx_sites_defaultserver_manage: true

# Additional NGINX configuration directives for the main (top-level) context of
# `nginx.conf`, placed outside of any block such as `events {}` or `http {}`.
#
# The value is inserted verbatim into the rendered configuration file. Only
# directives valid in the NGINX main context should be used here (e.g.,
# `worker_processes`, `error_log`, `pid`).
#
# For block-specific configuration, use the dedicated variables instead:
#
# - `run_nginx_events_config_block` (for the `events {}` block)
# - `run_nginx_http_config_block` (for the `http {}` block)
# - `run_nginx_sites_config` (for `server {}` blocks)
#
# - Type: str
# - Required: No
# - Default: 
run_nginx_main_config_block: ""

# Additional NGINX configuration directives for the `events {}` block in the
# main configuration file (`nginx.conf`).
#
# The value is inserted verbatim inside the `events {}` block. Do not include
# the `events {` and `}` delimiters themselves - only the directives that belong
# inside the block (e.g., `worker_connections`, `use`).
#
# `events {}` is a top-level context block in NGINX. Only one instance is
# allowed, so this variable provides a way to inject custom directives there.
#
# - Type: str
# - Required: No
# - Default: 
run_nginx_events_config_block: ""

# Additional NGINX configuration directives for the `http {}` block in the main
# configuration file (`nginx.conf`).
#
# The value is inserted verbatim inside the `http {}` block. Do not include the
# `http {` and `}` delimiters themselves - only the directives that belong
# inside the block (e.g., `include`, `default_type`, `log_format`).
#
# `http {}` is a top-level context block that initializes the entire HTTP
# subsystem. Only one instance is allowed, so this variable provides a way to
# inject custom directives there. For `server {}` block definitions, use
# `run_nginx_sites_config` instead.
#
# - Type: str
# - Required: No
# - Default: 
run_nginx_http_config_block: ""

# Controls whether the role injects curated baseline directives into the main
# (top-level) context of the main configuration file (`nginx.conf`).
#
# When set to `true`, the role provides sane defaults for the main context
# (e.g., `worker_processes`, `error_log`, `pid`). These baseline directives are
# merged from internal defaults and platform-specific overrides.
#
# Custom directives supplied via `run_nginx_main_config_block` are rendered
# alongside the baseline. If set to `false`, no baseline directives are injected
# and you will likely need to provide essential main-context directives yourself
# via `run_nginx_main_config_block` to get a working service.
#
# - Type: bool
# - Required: No
# - Default: true
run_nginx_main_config_baseline_manage: true

# Controls whether the role injects curated baseline directives into the `events
# {}` block of the main configuration file (`nginx.conf`).
#
# When set to `true`, the role provides sane defaults for the events context
# (e.g., `worker_connections`). These baseline directives are merged from
# internal defaults and platform-specific overrides.
#
# Custom directives supplied via `run_nginx_events_config_block` are rendered
# alongside the baseline.
#
# - Type: bool
# - Required: No
# - Default: true
run_nginx_events_config_baseline_manage: true

# Controls whether the role injects curated baseline directives into the `http
# {}` block of the main configuration file (`nginx.conf`).
#
# When set to `true`, the role provides sane defaults for the HTTP context
# (e.g., `sendfile`, `tcp_nopush`, `types_hash_max_size`, MIME type includes).
# These baseline directives are merged from internal defaults and
# platform-specific overrides.
#
# Custom directives supplied via `run_nginx_http_config_block` are rendered
# alongside the baseline.
#
# - Type: bool
# - Required: No
# - Default: true
run_nginx_http_config_baseline_manage: true

# List of site definitions (sometimes called vHosts) to manage. Each entry
# describes a site as a dictionary holding its name, enablement state, and raw
# NGINX configuration content.
#
# For each entry, the role renders a config file at
# `/etc/nginx/sites-available/<name>.conf`. If `enabled: true`, a symlink is
# created in `/etc/nginx/sites-enabled/` pointing to the file in
# `sites-available/`. The `sites-enabled/` directory is included by the main
# `http {}` block via the role's managed `nginx.conf`, so only symlinked sites
# become active. Setting `enabled: false` keeps the `sites-available/` file in
# place but removes the symlink, making it easy to temporarily disable a site
# without losing its configuration.
#
# Stale `sites-available/` and `sites-enabled/` files no longer listed here are
# removed when `run_nginx_sites_delete_unmanaged` is `true` (the default).
#
# On SUSE-like platforms the directories `hosts.d-available/` (instead of
# `sites-available/`) and `/etc/nginx/vhosts.d` (instead of`sites-available/`)
# are used as SUSE uses theses dirs and the "vHost" terminology by default.
#
# Example:
#
# ```yaml
# run_nginx_sites_config:
#   - name: "example.com"
#     enabled: true
#     content: |
#       server {
#           listen 443 ssl;
#           server_name example.com;
#           root /var/www/example.com;
#
#           ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
#           ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
#
#           include /etc/nginx/snippets/http/tls-baseline.conf;
#           include /etc/nginx/snippets/server/headers-security.conf;
#           include /etc/nginx/snippets/server/headers-hsts.conf;
#
#           location / {
#               try_files $uri $uri/ =404;
#           }
#       }
#   - name: "foo_bar"
#     enabled: true
#     content: |
#       upstream {
#           [...]
#       }
#       server {
#           [...]
#       }
# ```
#
# - Type: list
# - Required: No
# - Default: []
run_nginx_sites_config: []

# Controls whether the role removes stale site files that are not declared in
# `run_nginx_sites_config`.
#
# When set to `true`, any `*.conf` file or symlink found in
# `/etc/nginx/sites-available/` or `/etc/nginx/sites-enabled/` whose name does
# not match an entry in `run_nginx_sites_config` is deleted. This keeps the
# managed directories in sync with the declared list, treating
# `run_nginx_sites_config` as the single source of truth.
#
# When set to `false`, unknown files are left untouched. Use this if you manage
# additional sites outside of this role and want to prevent accidental removal.
#
# - Type: bool
# - Required: No
# - Default: true
run_nginx_sites_delete_unmanaged: true

# Controls whether the role ships and manages its curated NGINX config snippets
# (reusable, centrally maintained config blocks meant to be pulled into `server
# {}` / `location {}` blocks via `include snippets/<name>.conf;`).
#
# When set to `true`, the role ensures the
# `/etc/nginx/snippets/{http,location,server}/` directories exist and renders
# all snippet templates shipped with the role into them. Snippet content can be
# influenced via `run_nginx_snippet_settings`.
#
# When set to `false`, the role skips creating the snippet directories and does
# not render any snippet templates. Use this if you want to maintain your own
# snippet library entirely outside of this role. Cleanup of stale files is also
# gated by this variable: `run_nginx_snippets_delete_unmanaged` only takes
# effect while snippets are managed.
#
# - Type: bool
# - Required: No
# - Default: true
run_nginx_snippets_manage: true

# Controls whether the role removes snippet files below `/etc/nginx/snippets/`
# that are not managed by this role.
#
# When set to `true`, any files in the snippet subdirectories (`http/`,
# `server/`, `location/`) that were not rendered by the role's snippet templates
# are deleted. This keeps the snippet directories clean and prevents stale or
# conflicting snippets.
#
# When set to `false`, unknown files are left untouched. Use this if you
# maintain additional custom snippets outside of this role.
#
# Only takes effect when `run_nginx_snippets_manage` is `true`.
#
# - Type: bool
# - Required: No
# - Default: false
run_nginx_snippets_delete_unmanaged: false

# User-level overrides for the configuration snippets shipped by this role.
#
# Each top-level key corresponds to a snippet name (e.g. `hsts`, `php-fpm`,
# `tls-baseline`). Values are dictionaries whose keys map to template variables
# used when rendering the snippet.
#
# Settings provided here take highest priority, overriding both the internal
# defaults (see `__run_nginx_snippet_settings_defaults` in `vars/main.yml`) and
# any platform-specific overrides. Only the keys you specify are overridden; all
# other settings keep their default values.
#
# Example:
#
# ```yaml
# run_nginx_snippet_settings:
#   hsts:
#     max_age: 63072000
#     preload: true
#   tls-baseline:
#     resolvers:
#       - "127.0.0.1"
# ```
#
# - Type: dict
# - Required: No
# - Default: {}
run_nginx_snippet_settings: {}

# List of dynamic NGINX module names to enable at runtime.
#
# Module names follow the canonical `.so` filename with the `ngx_` prefix and
# `_module` suffix stripped. The general pattern is `<context>_<name>` (e.g.
# `http_perl` from `ngx_http_perl_module.so`). See the naming convention comment
# in `vars/main.yml` for the full specification.
#
# Example:
#
# ```yaml
# run_nginx_modules_enabled:
#   - "http_echo"
#   - "http_headers_more_filter"
#   - "http_image_filter"
#   - "http_brotli_filter"
#   - "http_brotli_static"
# ```
#
# There are two types of modules in NGINX: built-in and dynamic. Only dynamic
# modules can be toggled this way; modules compiled into the NGINX binary are
# always active and cannot be managed via this list (`nginx -V 2>&1 | xargs -n1
# | grep module` shows the compiled-in set).
#
# Only modules known to the platform-specific
# `__run_nginx_modules_map_resources` mapping (see `vars/main.yml` and the
# platform overrides in `vars/debian.yml`, `vars/redhat.yml`, `vars/suse.yml`)
# are managed by this role. Modules not present in that mapping are silently
# skipped; if you need to enable such a module, add the necessary `load_module`
# configuration via your own tasks on top of this role.
#
# For each listed and known module, the role installs required distribution
# packages automatically and places the appropriate config file in
# `/etc/nginx/modules-enabled/`. On platforms where packages ship their own
# `.conf` files (Debian, RedHat, Fedora), the role creates a symlink to the
# package-provided file. On platforms without package-provided configs (SUSE),
# the role generates a `load_module` config file directly.
#
# - Type: list
# - Required: No
# - Default: []
run_nginx_modules_enabled: []

# Controls whether the role removes dynamic module symlinks that are not
# declared in `run_nginx_modules_enabled`.
#
# When set to `true`, any `*.conf` file or symlink found in
# `/etc/nginx/modules-enabled/` whose name does not match an entry in
# `run_nginx_modules_enabled` is removed. This keeps the managed directory in
# sync with the declared list, treating `run_nginx_modules_enabled` as the
# single source of truth.
#
# When set to `false`, unknown files are left untouched. Use this if you manage
# additional modules outside of this role and want to prevent accidental
# unavailability of dynamic modules loaded by default on your platform.
#
# Stale cleanup is only performed when the platform-specific module mapping
# provides `conf_files` data. On platforms where `conf_files` is empty for all
# modules (package postinst handles everything), stale cleanup is automatically
# skipped.
#
# - Type: bool
# - Required: No
# - Default: true
run_nginx_modules_disable_unmanaged: true
